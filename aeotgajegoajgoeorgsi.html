<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schválení recenze Honza3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #07111f 0%, #152a4a 45%, #6b3fa0 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            margin-bottom: 24px;
            text-align: center;
        }
        header h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            margin-bottom: 8px;
        }
        header p {
            color: rgba(255,255,255,0.85);
        }
        .panel {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 24px;
            padding: 28px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.24);
            margin-bottom: 24px;
        }
        .panel h2 {
            margin-bottom: 18px;
        }
        .form-row {
            display: grid;
            gap: 12px;
            margin-bottom: 18px;
        }
        label {
            font-weight: 700;
            color: #f5f5f5;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.16);
            background: rgba(255,255,255,0.08);
            color: #fff;
            font-size: 1rem;
        }
        textarea { min-height: 140px; resize: vertical; }
        button {
            padding: 14px 22px;
            border: none;
            border-radius: 14px;
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        button:hover { transform: translateY(-2px); }
        .note {
            margin-bottom: 16px;
            color: rgba(255,255,255,0.8);
            line-height: 1.75;
        }
        .success-message {
            display: none;
            margin-top: 16px;
            padding: 16px 18px;
            border-radius: 14px;
            background: rgba(76,175,80,0.18);
            border: 1px solid rgba(76,175,80,0.35);
            color: #d7ffd7;
        }
        .reviews-list {
            margin-top: 16px;
            display: grid;
            gap: 16px;
        }
        .review-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 18px;
        }
        .review-meta {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .review-meta div { font-weight: 700; }
        .review-text { line-height: 1.8; color: rgba(255,255,255,0.85); }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Schválení recenze</h1>
            <p>Tuto stránku otevřete pouze vy. Pošlete recenzi do Discordu a potom ji sem vložte, abyste ji mohli přidat na web.</p>
        </header>

        <section class="panel">
            <h2>Přidat schválenou recenzi</h2>
            <p class="note">Zadejte jméno, hodnocení a text recenze, kterou chcete publikovat. Tato stránka není odkázaná veřejně.</p>
            <div class="form-row">
                <label for="approvedName">Jméno</label>
                <input type="text" id="approvedName" placeholder="Jméno zákazníka">
            </div>
            <div class="form-row">
                <label for="approvedRating">Hodnocení</label>
                <select id="approvedRating">
                    <option value="">-- Vyberte počet hvězdiček --</option>
                    <option value="5">★★★★★</option>
                    <option value="4">★★★★☆</option>
                    <option value="3">★★★☆☆</option>
                    <option value="2">★★☆☆☆</option>
                    <option value="1">★☆☆☆☆</option>
                </select>
            </div>
            <div class="form-row">
                <label for="approvedText">Recenze</label>
                <textarea id="approvedText" placeholder="Schválený text recenze"></textarea>
            </div>
            <button id="approveReviewBtn" type="button">Schválit a přidat recenzi</button>
            <div class="success-message" id="approveSuccess"></div>
        </section>

        <section class="panel">
            <h2>Aktuální recenze</h2>
            <div class="reviews-list" id="adminReviews"></div>
        </section>
    </div>

    <script>
        const apiUrl = 'https://6a46aa4ea268c8be2ce83b9a.mockapi.io/reviews';
        const approveBtn = document.getElementById('approveReviewBtn');
        const approvedName = document.getElementById('approvedName');
        const approvedRating = document.getElementById('approvedRating');
        const approvedText = document.getElementById('approvedText');
        const approveSuccess = document.getElementById('approveSuccess');
        const adminReviews = document.getElementById('adminReviews');

        async function loadAdminReviews() {
            try {
                const response = await fetch(apiUrl);
                if (!response.ok) throw new Error('Nelze načíst recenze');
                const reviews = await response.json();
                adminReviews.innerHTML = reviews
                    .sort((a,b) => new Date(b.createdAt) - new Date(a.createdAt))
                    .map(review => `
                        <article class="review-card">
                            <div class="review-meta">
                                <div>${review.name}</div>
                                <div>${'★'.repeat(review.rating)}${'☆'.repeat(5 - review.rating)}</div>
                            </div>
                            <p class="review-text">${review.text}</p>
                        </article>
                    `).join('');
            } catch (error) {
                adminReviews.innerHTML = '<p style="color:#f5f5f5;">Nelze načíst aktuální recenze.</p>';
                console.error(error);
            }
        }

        async function approveReview() {
            const name = approvedName.value.trim();
            const rating = parseInt(approvedRating.value, 10);
            const text = approvedText.value.trim();

            if (!name || !rating || !text) {
                approveSuccess.innerText = 'Vyplňte jméno, hodnocení i text recenze.';
                approveSuccess.style.display = 'block';
                return;
            }

            const review = { name, rating, text, createdAt: new Date().toISOString() };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(review)
                });

                if (!response.ok) throw new Error('Schválení selhalo');
                approveSuccess.innerText = 'Recenze byla přidána na web.';
                approveSuccess.style.display = 'block';
                approvedName.value = '';
                approvedRating.value = '';
                approvedText.value = '';
                loadAdminReviews();
            } catch (error) {
                approveSuccess.innerText = 'Schválení selhalo. Zkuste to znovu.';
                approveSuccess.style.display = 'block';
                console.error(error);
            }
        }

        approveBtn.addEventListener('click', approveReview);
        loadAdminReviews();
    </script>
</body>
</html>
